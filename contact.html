<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | Labor Ready NY Inc</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header></header>
  <section class="page-hero">
    <div class="page-hero-inner">
      <div class="breadcrumb"><a href="index.html">Home</a> / <span>Contact</span></div>
      <h1>Contact Labor Ready NY Inc</h1>
      <p>Use the form below or call us directly for urgent staffing requests.</p>
    </div>
  </section>

  <section class="section-inner">
    <div class="form-wrapper">
      <form action="https://formspree.io/f/mgvevdok" method="POST" data-formspree novalidate>
        <p class="required-note">* Required fields</p>
        <div class="form-row">
          <div class="form-group"><label for="fname">First Name *</label><input id="fname" name="first_name" required /></div>
          <div class="form-group"><label for="lname">Last Name *</label><input id="lname" name="last_name" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label for="phone">Phone *</label><input id="phone" name="phone" required /></div>
          <div class="form-group"><label for="email">Email *</label><input id="email" name="email" type="email" required /></div>
        </div>
        <div class="form-group"><label for="subject">Subject *</label><input id="subject" name="subject" required /></div>
        <div class="form-group"><label for="message">Message *</label><textarea id="message" name="message" required></textarea></div>
        <div class="form-group checkbox-row"><input type="checkbox" id="consent" name="consent" required /><label for="consent">I agree to be contacted regarding my inquiry.</label></div>
        <button type="submit" class="btn-submit">Send Message</button>
        <div class="form-success">Thanks! Your message was sent.</div>
        <div class="form-error-msg">Something went wrong. Please call us directly.</div>
      </form>
    </div>
  </section>

  <footer></footer>
  <script src="main.js"></script>
</body>
</html>
