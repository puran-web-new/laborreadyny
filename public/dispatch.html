<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatch Request | Labor Ready NY Inc</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header></header>
  <section class="page-hero">
    <div class="page-hero-inner">
      <div class="breadcrumb"><a href="/">Home</a> / <a href="/portal">Portal</a> / <span>Dispatch</span></div>
      <h1>Dispatch Request</h1>
      <p>Request workers for your active job site.</p>
    </div>
  </section>
  <section class="section-inner">
    <div class="form-wrapper">
      <form action="#" method="POST" data-intake-form novalidate>
        <p class="required-note">* Required fields</p>
        <p class="routing-note">Routing: this form sends directly to our secured Supabase intake system for admin review.</p>
        <input type="hidden" name="form_type" value="dispatch_request" />
        <div class="form-row">
          <div class="form-group"><label for="company">Company Name *</label><input id="company" name="company" required /></div>
          <div class="form-group"><label for="contact_name">Your Name *</label><input id="contact_name" name="contact_name" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label for="phone">Phone *</label><input id="phone" name="phone" required /></div>
          <div class="form-group"><label for="email">Email *</label><input id="email" name="email" type="email" required /></div>
        </div>
        <div class="form-group"><label for="site_address">Job Site Address *</label><input id="site_address" name="site_address" required /></div>
        <div class="form-row">
          <div class="form-group"><label for="trade">Trade Required *</label><input id="trade" name="trade" required /></div>
          <div class="form-group"><label for="worker_count">Number of Workers *</label><input id="worker_count" name="worker_count" required /></div>
        </div>
        <div class="form-group"><label for="notes">Special Requirements / Notes</label><textarea id="notes" name="notes"></textarea></div>
        <div class="form-group checkbox-row"><input type="checkbox" id="agree" name="agree" required /><label for="agree">I authorize contact for this dispatch request.</label></div>
        <button type="submit" class="btn-submit">Submit Dispatch Request</button>
        <div class="form-success">Thanks! Your dispatch request was submitted.</div>
        <div class="form-error-msg">Something went wrong. Please call us directly.</div>
      </form>
    </div>
  </section>
  <footer></footer>
  <script src="/intake-config.js"></script>
  <script src="/main.js"></script>
</body>
</html>
