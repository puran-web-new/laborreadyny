<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worker Application | Labor Ready NY Inc</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header></header>
  <section class="page-hero">
    <div class="page-hero-inner">
      <div class="breadcrumb"><a href="index.html">Home</a> / <a href="portal.html">Portal</a> / <span>Apply</span></div>
      <h1>Worker Application</h1>
      <p>Apply to join our workforce network.</p>
    </div>
  </section>
  <section class="section-inner">
    <div class="form-wrapper">
      <form action="https://formspree.io/f/mgvevdok" method="POST" data-formspree novalidate>
        <p class="required-note">* Required fields</p>
        <p class="required-note">Applications submit to our Formspree recruiting inbox for review by the Labor Ready NY team.</p>
        <div class="form-row">
          <div class="form-group"><label for="first_name">First Name *</label><input id="first_name" name="first_name" required /></div>
          <div class="form-group"><label for="last_name">Last Name *</label><input id="last_name" name="last_name" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label for="phone">Phone *</label><input id="phone" name="phone" required /></div>
          <div class="form-group"><label for="email">Email</label><input id="email" name="email" type="email" /></div>
        </div>
        <div class="form-group"><label for="address">Home Address *</label><input id="address" name="address" required /></div>
        <div class="form-row">
          <div class="form-group"><label for="city">City *</label><input id="city" name="city" required /></div>
          <div class="form-group"><label for="state_zip">State / ZIP *</label><input id="state_zip" name="state_zip" required /></div>
        </div>
        <div class="form-group"><label for="trade">Primary Trade / Skill *</label><input id="trade" name="trade" required /></div>
        <div class="form-group"><label for="experience">Years of Experience *</label><input id="experience" name="experience" required /></div>
        <div class="form-group"><label for="notes">Additional Skills / Notes</label><textarea id="notes" name="notes"></textarea></div>
        <div class="form-group checkbox-row"><input type="checkbox" id="agree" name="agree" required /><label for="agree">I confirm the information above is accurate.</label></div>
        <button type="submit" class="btn-submit">Submit Application</button>
        <div class="form-success">Thanks! Your application was submitted.</div>
        <div class="form-error-msg">Something went wrong. Please call us directly.</div>
      </form>
    </div>
  </section>
  <footer></footer>
  <script src="main.js"></script>
</body>
</html>
